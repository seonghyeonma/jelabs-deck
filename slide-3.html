<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>JE Labs - Section Divider</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #000000;
            overflow: hidden;
        }
        .slide-container {
            width: 1280px;
            height: 720px;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        .neon-text-glow {
            text-shadow: 0 0 30px rgba(0, 245, 184, 0.4);
        }
        .neon-box-glow {
            box-shadow: 0 0 20px rgba(0, 245, 184, 0.5);
        }
        .blinking-cursor {
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: rgba(0, 245, 184, 0.3);
            animation: scan 8s linear infinite;
            opacity: 0.3;
        }
        @keyframes scan {
            0% { top: -10%; }
            100% { top: 110%; }
        }
        @keyframes slideRight {
            0% { transform: translateX(-100%); }
            50% { transform: translateX(0); }
            100% { transform: translateX(100%); }
        }
    </style>
</head>
<body>
<div class="slide-container">
<svg class="absolute inset-0 w-full h-full opacity-20 pointer-events-none" xmlns="http://www.w3.org/2000/svg">
<defs>
<pattern height="50" id="grid-pattern" patternunits="userSpaceOnUse" width="50">
<path d="M 50 0 L 0 0 0 50" fill="none" stroke="rgba(30, 30, 30, 0.5)" stroke-width="1"></path>
</pattern>
</defs>
<rect fill="url(#grid-pattern)" height="100%" width="100%"></rect>
</svg>
<div class="scan-line"></div>
<div class="absolute top-8 left-8 w-8 h-8 border-t-2 border-l-2 border-[#333]"></div>
<div class="absolute top-8 right-8 w-8 h-8 border-t-2 border-r-2 border-[#333]"></div>
<div class="absolute bottom-8 left-8 w-8 h-8 border-b-2 border-l-2 border-[#333]"></div>
<div class="absolute bottom-8 right-8 w-8 h-8 border-b-2 border-r-2 border-[#333]"></div>
<svg class="absolute inset-0 w-full h-full pointer-events-none opacity-10" viewbox="0 0 1280 720">
<line stroke="#00F5B8" stroke-width="1" x1="640" x2="640" y1="0" y2="720"></line>
<line stroke="#00F5B8" stroke-width="1" x1="0" x2="1280" y1="360" y2="360"></line>
<circle cx="640" cy="360" fill="none" r="250" stroke="#00F5B8" stroke-dasharray="4 4" stroke-width="1"></circle>
<circle cx="640" cy="360" fill="none" r="150" stroke="#00F5B8" stroke-width="0.5"></circle>
</svg>
<div class="relative z-10 flex flex-col items-center justify-center w-full h-full">
<div class="flex items-center gap-3 mb-8">
<div class="w-2 h-2 rounded-full bg-[#00F5B8] neon-box-glow"></div>
<p class="text-[#00F5B8] font-mono text-sm tracking-[0.4em] font-medium uppercase neon-text-glow">
                    Section 01
                </p>
<div class="w-2 h-2 rounded-full bg-[#00F5B8] neon-box-glow"></div>
</div>
<h1 class="text-white text-[120px] font-black leading-[0.9] tracking-tighter text-center mb-10">
                WHO<br/>
<span class="text-transparent" style="-webkit-text-stroke: 2px white;">WE ARE</span>
</h1>
<div class="relative w-[180px] h-[6px] bg-[#222] mb-10 overflow-hidden">
<div class="absolute inset-0 bg-[#00F5B8] neon-box-glow w-full h-full transform -translate-x-full" style="animation: slideRight 3s ease-in-out infinite;"></div>
</div>
<div class="text-center">
<p class="text-white text-3xl font-light tracking-wide mb-2">
                    Your Integrated <span class="text-[#00F5B8] font-medium">Growth Command Center</span>
</p>
<p class="text-gray-500 text-sm font-light tracking-widest uppercase mt-4">
                    Just Empower the Ambitious Innovators
                </p>
</div>
</div>
<div class="absolute bottom-10 w-full flex justify-between px-16 text-[#444] font-mono text-xs tracking-widest items-end">
<div class="flex flex-col">
<p class="mb-1">JE LABS SYSTEM</p>
<div class="flex gap-4">
<p>STATUS: <span class="text-[#00F5B8]">ACTIVE</span></p>
<p class="blinking-cursor">_</p>
</div>
</div>
<div class="absolute right-16 bottom-0">
<img alt="JE Labs Logo" class="w-[120px] h-auto object-contain" src="https://www.genspark.ai/api/files/s/vZEsqoBT"/>
</div>
<p class="self-end pb-1 ml-auto mr-[140px]">V.2026.1</p>
</div>
</div>
<script>document.addEventListener("keydown",function(e){if(e.key==="ArrowRight"||e.key==="ArrowDown"||e.key===" "){e.preventDefault();window.parent.postMessage("next","*")}else if(e.key==="ArrowLeft"||e.key==="ArrowUp"){e.preventDefault();window.parent.postMessage("prev","*")}});</script>
</body>
</html>
