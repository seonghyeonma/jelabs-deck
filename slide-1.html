<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>JE Labs Cover</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<style>
        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: #000000; 
            overflow: hidden; 
        }
        .slide-container { 
            width: 1280px; 
            height: 720px; 
            background-color: #000000; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            overflow: hidden; 
        }
        .neon-text { 
            color: #00F5B8; 
            text-shadow: 0 0 20px rgba(0, 245, 184, 0.3);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
<div class="slide-container">
<!-- Decorative Background Elements (SVG) -->
<svg class="absolute top-0 right-0 w-[900px] h-[900px] opacity-10 pointer-events-none transform translate-x-1/3 -translate-y-1/3" fill="none" viewbox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
<circle cx="50" cy="50" r="45" stroke="#00F5B8" stroke-width="0.1"></circle>
<circle cx="50" cy="50" r="35" stroke="#00F5B8" stroke-dasharray="2 2" stroke-width="0.1"></circle>
<circle cx="50" cy="50" r="25" stroke="#00F5B8" stroke-width="0.2"></circle>
<line stroke="#00F5B8" stroke-width="0.1" x1="50" x2="95" y1="50" y2="50"></line>
<line stroke="#00F5B8" stroke-width="0.1" x1="50" x2="50" y1="50" y2="5"></line>
</svg>
<!-- Content Wrapper -->
<div class="relative z-10 flex flex-col justify-between h-full p-16">
<!-- Header Section -->
<div class="flex justify-between items-start">
<div class="flex flex-col gap-2">
<div class="w-12 h-1 bg-[#00F5B8] shadow-[0_0_10px_#00F5B8]"></div>
<p class="text-white text-sm tracking-[0.3em] font-medium uppercase mt-2 opacity-80">Overview 2026</p>
</div>
<div class="glass-panel px-4 py-1 rounded-full">
<p class="text-[#00F5B8] text-xs font-bold tracking-widest">CONFIDENTIAL</p>
</div>
</div>
<!-- Main Title Section -->
<div class="flex flex-col justify-center flex-grow mt-8">
<div class="mb-2">
<p class="text-gray-400 text-xl font-light tracking-wide mb-4">
                        Strategic Growth Partner for Frontier Tech Builders
                    </p>
</div>
<h1 class="text-white text-[140px] font-black leading-[0.85] tracking-tighter mb-6">
                    JE <span class="neon-text">LABS</span>
</h1>
<div class="max-w-3xl border-l-2 border-[#333] pl-8 mt-4">
<p class="text-white text-3xl font-light leading-snug">
<span class="text-[#00F5B8] font-bold">J</span>ust 
                        <span class="text-[#00F5B8] font-bold">E</span>mpower the 
                        <br/>
<span class="font-bold">Ambitious Innovators</span>
</p>
</div>
</div>
<!-- Footer Section -->
<div class="flex items-end justify-between w-full pt-8 border-t border-[#222]">
<div class="flex items-center gap-4">
<div class="w-2 h-2 rounded-full bg-[#00F5B8]"></div>
<p class="text-gray-500 text-sm font-mono">INTEGRATED GROWTH COMMAND CENTER</p>
</div>
<div class="flex items-center gap-8">
<div class="flex items-center gap-3 opacity-70">
<span class="text-gray-500 text-sm font-light">SCROLL TO BEGIN</span>
<i class="fa-solid fa-arrow-down text-[#00F5B8] animate-bounce"></i>
</div>
<img alt="JE Labs Logo" class="w-28 opacity-90" src="https://www.genspark.ai/api/files/s/vZEsqoBT"/>
</div>
</div>
</div>
</div>
<script>document.addEventListener("keydown",function(e){if(e.key==="ArrowRight"||e.key==="ArrowDown"||e.key===" "){e.preventDefault();window.parent.postMessage("next","*")}else if(e.key==="ArrowLeft"||e.key==="ArrowUp"){e.preventDefault();window.parent.postMessage("prev","*")}});</script>
</body>
</html>
